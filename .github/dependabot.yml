# Dependabot — automated dependency-update PRs.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # Python deps declared in pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    # Group routine Python version updates by runtime/dev dependency family so
    # related bumps land together.
    groups:
      python-runtime:
        patterns:
          - "pydantic*"
          - "httpx"
          - "tomli*"
      python-dev:
        patterns:
          - "pytest*"
          - "hypothesis"
          - "ruff"

  # GitHub Actions versions pinned in .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"

  # pre-commit hook repos pinned in .pre-commit-config.yaml
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "tooling"
    commit-message:
      prefix: "tooling"
