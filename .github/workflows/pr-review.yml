name: PR review

# Runs the v0 PR-review bot on every PR open / new push / reopen.
# The bot writes a structured forensic review to docs/reviews/<PR>-iter<K>.md
# on the PR branch and posts a comment with the link. It does NOT merge.
#
# Note: this uses `pull_request` (not `pull_request_target`). That's the safe
# choice — workflows triggered by external forks will not have access to the
# CLAUDE_CODE_OAUTH_TOKEN secret, and the bot will simply no-op for those PRs.
# Same-repo PRs get full review.
#
# Auth: uses the Claude Code Pro/Max subscription via CLAUDE_CODE_OAUTH_TOKEN.
# Populate the secret with `claude` then `/install-github-app` (one time).

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip on forks (no secret access anyway, but explicit is better).
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write          # commit the review artefact to PR branch
      pull-requests: write     # comment with the link
    steps:
      - name: Checkout PR head for artefact commit only
        uses: actions/checkout@v6
        with:
          path: pr-head
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout trusted reviewer code
        uses: actions/checkout@v6
        with:
          path: trusted-reviewer
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node (for the claude CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install the Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run review
        id: review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_REVIEW_EXISTING_REVIEWS_DIR: ../pr-head/docs/reviews
        working-directory: trusted-reviewer
        run: |
          set -euo pipefail
          ARTEFACT=$(python -m tools.pr_review --pr ${{ github.event.pull_request.number }})
          # `python -m tools.pr_review` exits 0 with empty stdout if the OAuth
          # token is missing — workflow stays green; operator can populate the
          # secret later (claude → /install-github-app) and future PRs will
          # produce reviews.
          echo "artefact=${ARTEFACT:-}" >> "$GITHUB_OUTPUT"

      - name: Commit review artefact to PR branch
        if: steps.review.outputs.artefact != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          ARTEFACT="${{ steps.review.outputs.artefact }}"
          ARTEFACT="$ARTEFACT" python - <<'PY'
          import os
          import re
          import sys

          artefact = os.environ["ARTEFACT"]
          if not re.fullmatch(r"docs/reviews/[0-9]+-iter[0-9]+\.md", artefact):
              sys.stderr.write(f"Unexpected artefact path: {artefact}\n")
              sys.exit(1)
          PY
          mkdir -p "pr-head/$(dirname "$ARTEFACT")"
          cp "trusted-reviewer/$ARTEFACT" "pr-head/$ARTEFACT"
          cd pr-head
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$ARTEFACT"
          git diff --staged --quiet || git commit -m "review: add $(basename $ARTEFACT) [skip ci]"
          git push origin "HEAD:${PR_HEAD_REF}"

      - name: Comment on PR
        if: steps.review.outputs.artefact != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTEFACT="${{ steps.review.outputs.artefact }}"
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "🔎 Automated review artefact committed to this PR branch: \`$ARTEFACT\`"
