name: PR review

# Runs the v0 PR-review bot on every PR open / new push / reopen.
# The bot writes a structured forensic review to docs/reviews/<PR>-iter<K>.md
# on the PR branch and posts a comment with the link. It does NOT merge.
#
# Note: this uses `pull_request` (not `pull_request_target`). That's the safe
# choice — workflows triggered by external forks will not have access to the
# ANTHROPIC_API_KEY secret, and the bot will simply no-op for those PRs.
# Same-repo PRs get full review.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip on forks (no secret access anyway, but explicit is better).
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write          # commit the review artefact to PR branch
      pull-requests: write     # comment with the link
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ARTEFACT=$(python -m tools.pr_review --pr ${{ github.event.pull_request.number }})
          echo "artefact=$ARTEFACT" >> "$GITHUB_OUTPUT"

      - name: Commit review artefact to PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ARTEFACT="${{ steps.review.outputs.artefact }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$ARTEFACT"
          git diff --staged --quiet || git commit -m "review: add $(basename $ARTEFACT) [skip ci]"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTEFACT="${{ steps.review.outputs.artefact }}"
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "🔎 Automated review: [\`$ARTEFACT\`](https://github.com/${{ github.repository }}/blob/${{ github.event.pull_request.head.ref }}/$ARTEFACT)"
