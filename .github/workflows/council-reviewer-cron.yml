name: Council reviewer cron

# Every 6 hours, iterate every OPEN pull request, run (or reuse) the v0 per-PR
# forensic review, parse the verdict, and act:
#   APPROVE                   → squash-merge + delete branch
#   APPROVE-WITH-MINOR-MODIFY → comment "soft notes; merging", then merge
#   MODIFY                    → ask Claude for unified-diff fixup; push it
#                               to the PR branch if it applies cleanly,
#                               else comment-only with `needs-modify` label
#   REJECT | NEEDS-MAINTAINER → comment + label `needs-maintainer`, await operator
#
# Pairs with the per-PR reviewer (.github/workflows/pr-review.yml) that fires
# on every push to a PR. This cron is the META loop that ACTS on those reviews.

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:         # manual button

concurrency:
  group: reviewer-cron
  cancel-in-progress: false  # don't cancel a mid-flight cron; let it finish

permissions:
  contents: write          # squash-merge + push fixup commits
  pull-requests: write     # comment + label
  issues: write            # label support

jobs:
  reviewer-cron:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install reviewer deps
        run: pip install anthropic

      - name: Run reviewer cron
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: python -m tools.pr_review.cron
