name: Design feedback
description: Push back on a load-bearing design choice
labels: ["design-feedback"]
body:
  - type: dropdown
    id: which
    attributes:
      label: Which of the README "Looking for feedback on" questions are you pushing back on?
      options:
        - "1. Chairman dual-hat (synthesiser + Skeptic until that seat ships)"
        - "2. Procedural vs mechanical anonymisation"
        - "3. The MEDIUM cap (Chairman premise-validation power)"
        - "4. Single-model verifier risk (Kimi K2.6 systematic blind spot)"
        - "5. AceMAD's discrete sample-space scaling"
        - Other design claim (specify below)
    validations:
      required: true

  - type: textarea
    id: claim
    attributes:
      label: What's the design claim you disagree with (in your own words)?
      placeholder: |
        e.g. "The MEDIUM cap can be imposed unilaterally by the Chairman
        without explicit dissent from any voter — this is too much
        gatekeeping power."
    validations:
      required: true

  - type: textarea
    id: counter
    attributes:
      label: What would you do instead?
      placeholder: |
        e.g. "Require at least one voter to ALSO express framing-level
        reservation before the cap engages, OR raise it to LOW with the
        Chairman's reservation alone."
    validations:
      required: true

  - type: textarea
    id: failure-mode
    attributes:
      label: What failure mode of the current design are you targeting?
      description: Concrete is better than abstract.
    validations:
      required: false

  - type: textarea
    id: links
    attributes:
      label: Prior art or relevant papers (optional)
    validations:
      required: false
