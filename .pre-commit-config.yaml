# pre-commit hooks for typed-llm-council
# Install once:  pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files
#
# CI installs Ruff from pyproject's dev dependencies. This pre-commit hook pins
# its own Ruff wrapper version; keep it current with `pre-commit autoupdate`
# (or add Dependabot's pre-commit ecosystem if automated hook bumps are desired).

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        # Issue forms use GitHub-specific YAML; pre-commit's yamllint is
        # fine for syntax but allow these to be skipped if they ever
        # contain anchors that vanilla pyyaml dislikes.
        args: ["--allow-multiple-documents"]
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: '\.md$'   # markdown trailing whitespace is sometimes intentional (line break)
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
